name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # -------- BACKEND BUILD --------
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR with Maven
        run: mvn clean package -DskipTests
        working-directory: ./springboot/app

      # -------- DOCKER LOGIN --------
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------- BUILD & PUSH BACKEND IMAGE --------
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # -------- BUILD & PUSH FRONTEND IMAGE --------
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # -------- TEST DOCKER COMPOSE --------
      - name: Test Deployment with Docker Compose
        run: docker compose up -d
