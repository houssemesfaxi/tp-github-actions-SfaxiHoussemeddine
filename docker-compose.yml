version: "3.3"

services:
  angular-app:
    image: sfaxi/angular-app:latest
    ports:
      - "0.0.0.0:4200:80"
    depends_on:
      - spring-boot-app

  mysql:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: demo
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "0.0.0.0:3306:3306"
    volumes:
      - demo:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  spring-boot-app:
    image: sfaxi/springboot-app:latest
    restart: on-failure
    ports:
      - "0.0.0.0:8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demo
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      spring.jpa.database-platform: org.hibernate.dialect.MySQL8Dialect
    depends_on:
      - mysql

volumes:
  demo:
